services:
  front:
    build:
      context: .
      dockerfile: docker/front/Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/back/Dockerfile
    ports:
      - "3333:3333"
    volumes:
      - ./back:/app
      - /app/node_modules
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: agriculteur
      DB_PASSWORD: agriculteur
      DB_DATABASE: agriculteur
    env_file:
      - ./back/.env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: agriculteur
      POSTGRES_USER: agriculteur
      POSTGRES_PASSWORD: agriculteur

volumes:
  postgres_data:
