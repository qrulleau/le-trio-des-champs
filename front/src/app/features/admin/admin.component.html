<div class="min-h-screen bg-gray-50">
  <header class="bg-gradient-to-r from-purple-700 to-purple-500 text-white px-8 py-5 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold">Administration</h1>
      <p class="text-purple-200 text-sm">Le Trio des Champs</p>
    </div>
    <a routerLink="/" class="bg-white/20 hover:bg-white/30 transition px-4 py-2 rounded-full text-sm flex items-center gap-2">
      Retour au site
    </a>
  </header>
  <div class="flex">
    <aside class="w-72 min-h-screen bg-white shadow-sm p-4 flex flex-col justify-between">
      <nav class="space-y-1">
        @for (item of menuItems; track item.path) {
          <a [routerLink]="item.path" routerLinkActive="bg-purple-600 text-white" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition text-sm">
            <span>{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>
      <div class="text-center text-xs text-gray-400 border-t pt-4 mt-4">
        <p>Sauvegarde automatique</p>
        <p class="mt-1">Les modifications sont enregistrees automatiquement.</p>
      </div>
    </aside>
    <main class="flex-1 p-8">
      <router-outlet />
    </main>
  </div>
</div>
