<div class="min-h-screen bg-gradient-to-br from-purple-700 to-purple-500 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold">Administration</h1>
      <p class="text-gray-500 text-sm mt-1">Le Trio des Champs</p>
    </div>

    @if (error) {
      <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl mb-4">
        {{ error }}
      </div>
    }

    <div class="space-y-4">
      <div>
        <label class="text-sm text-gray-600 mb-1 block">Email</label>
        <input
          [(ngModel)]="form.email"
          type="email"
          class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"
          placeholder="admin@letriodeschamps.fr"
        />
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">Mot de passe</label>
        <input
          [(ngModel)]="form.password"
          type="password"
          class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"
          placeholder="••••••••"
        />
      </div>
      <button
        (click)="submit()"
        [disabled]="loading"
        class="w-full bg-purple-600 hover:bg-purple-700 disabled:opacity-50 text-white py-3 rounded-xl font-medium transition"
      >
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </div>
  </div>
</div>
