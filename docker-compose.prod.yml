services:
  front:
    build:
      context: .
      dockerfile: docker/front/Dockerfile.prod
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/back/Dockerfile
    ports:
      - "3333:3333"
    env_file:
      - ./back/.env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: agriculteur
      POSTGRES_USER: agriculteur
      POSTGRES_PASSWORD: agriculteur

volumes:
  postgres_data:
